<!DOCTYPE html>
<html>
<head>
    <title>Auth Persistence Test</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Auth Persistence Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if localStorage is available
        log('<strong>Test 1:</strong> Checking localStorage availability...', 'info');
        try {
            localStorage.setItem('test', 'value');
            localStorage.removeItem('test');
            log('✓ localStorage is available', 'pass');
        } catch (e) {
            log('✗ localStorage is NOT available: ' + e.message, 'fail');
        }
        
        // Test 2: Simulate login by setting auth data
        log('<strong>Test 2:</strong> Simulating login...', 'info');
        const testUser = {
            id: 'test-123',
            email: 'test@example.com',
            name: 'Test User',
            initials: 'TU',
            isDeveloper: true
        };
        localStorage.setItem('ar-token', 'fake-jwt-token');
        localStorage.setItem('ar-user', JSON.stringify(testUser));
        log('✓ Auth data saved to localStorage', 'pass');
        
        // Test 3: Verify data is in localStorage
        log('<strong>Test 3:</strong> Verifying saved data...', 'info');
        const savedToken = localStorage.getItem('ar-token');
        const savedUser = localStorage.getItem('ar-user');
        if (savedToken && savedUser) {
            log('✓ Auth data exists in localStorage', 'pass');
            log('<pre>Token: ' + savedToken.substring(0, 20) + '...\nUser: ' + savedUser + '</pre>', 'info');
        } else {
            log('✗ Auth data NOT found in localStorage', 'fail');
        }
        
        // Test 4: Simulate what AuthContext does on mount
        log('<strong>Test 4:</strong> Simulating AuthContext mount...', 'info');
        setTimeout(() => {
            const saved = localStorage.getItem('ar-user');
            const token = localStorage.getItem('ar-token');
            
            if (saved && token) {
                try {
                    const parsedUser = JSON.parse(saved);
                    log('✓ Successfully loaded user from localStorage', 'pass');
                    log('<pre>Loaded user: ' + JSON.stringify(parsedUser, null, 2) + '</pre>', 'info');
                } catch (err) {
                    log('✗ Failed to parse user: ' + err.message, 'fail');
                }
            } else {
                log('✗ No auth data found (this would cause logout)', 'fail');
            }
            
            // Test 5: Count refreshes
            let refreshCount = parseInt(sessionStorage.getItem('refreshCount') || '0');
            refreshCount++;
            sessionStorage.setItem('refreshCount', refreshCount);
            log('<strong>Test 5:</strong> Refresh count: ' + refreshCount, 'info');
            
            if (refreshCount >= 2) {
                log('✓ Survived ' + refreshCount + ' refreshes', 'pass');
            }
            
            log('<br><button onclick="location.reload()">Refresh Page</button>', 'info');
        }, 100);
    </script>
</body>
</html>
